<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Verify OTP — CampusIQ</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet" />
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              heading: ['Sora', 'sans-serif'],
              body: ['DM Sans', 'sans-serif'],
            },
            colors: {
              brand: {
                50: '#eff6ff', 100: '#dbeafe', 200: '#bfdbfe', 300: '#93c5fd', 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb', 700: '#1d4ed8', 800: '#1e40af', 900: '#1e3a8a', 950: '#172554',
              },
            },
            animation: {
              'soft-light': 'softDiagonalLight 12s linear infinite',
              'underline-move': 'underlineMove 3s ease-in-out infinite',
            },
            keyframes: {
              softDiagonalLight: {
                '0%': { transform: 'translate(100%, -100%) rotate(45deg)' },
                '100%': { transform: 'translate(-100%, 100%) rotate(45deg)' },
              },
              underlineMove: {
                '0%, 100%': { transform: 'translateX(-100%)' },
                '50%': { transform: 'translateX(100%)' },
              }
            }
          }
        }
      };
    </script>
  </head>
  <body class="font-body text-slate-600 min-h-screen bg-gradient-to-br from-[#2563eb]/80 via-white to-[#2563eb]/20 selection:bg-brand-100 selection:text-brand-900 antialiased">
    <!-- Background decorations -->
    <div class="fixed inset-0 pointer-events-none z-0 overflow-hidden">
      <div class="absolute -top-40 -right-40 w-[500px] h-[500px] bg-brand-100/30 rounded-full blur-3xl"></div>
      <div class="absolute -bottom-40 -left-40 w-[500px] h-[500px] bg-brand-200/20 rounded-full blur-3xl"></div>
    </div>

    <div class="relative z-10 flex flex-col lg:flex-row min-h-screen items-center justify-center lg:justify-end overflow-hidden p-6 md:p-12 lg:p-0 lg:gap-x-20 lg:pr-12 xl:pr-24">
      <div class="relative hidden lg:flex flex-1 min-w-0 items-center justify-center">
        <!-- Floating Light Effect -->
        <div class="absolute w-[250%] h-[250px] bg-gradient-to-r from-transparent via-[#2563eb]/40 to-transparent blur-[40px] opacity-40 animate-soft-light pointer-events-none"></div>
        <iframe
          class="w-full max-w-3xl py-3 h-full min-h-[720px]"
          src="https://lottie.host/embed/532038ea-2eaf-4091-b2e8-c6f305d12928/tGgH3PzNnY.lottie"
        ></iframe>
      </div>
      <div class="relative flex flex-col content-center justify-center w-full max-w-md shrink-0">
        <div class="mb-10 text-center lg:text-left">
          <h1 class="relative inline-block overflow-hidden font-heading font-bold text-3xl text-blue-700 mb-2.5 pb-2 after:content-[''] after:absolute after:bottom-0 after:left-0 after:w-full after:h-[3px] after:bg-gradient-to-r after:from-transparent after:via-[#1957dd] after:to-transparent after:animate-underline-move">
            Welcome Back
          </h1>
          <p class="text-slate-500">
            OTP is sent to your registered email <br />username@gmail.com
          </p>
        </div>
        <form onsubmit="" class="space-y-6">
          <div>
            <label class="block text-sm font-semibold text-slate-700 mb-1.5" for="otp">
              Enter OTP
            </label>
            <div class="relative group shadow-sm transition-all focus-within:ring-[3px] focus-within:ring-brand-500/18 rounded-xl">
              <input
                id="otp"
                type="text"
                placeholder="Enter OTP"
                class="w-full px-4 py-3 rounded-xl border border-slate-200 text-slate-800 placeholder-slate-400 text-sm transition-all hover:border-slate-300 focus:outline-none focus:border-brand-500"
              />
            </div>
          </div>
          <div class="flex items-center justify-between">
            <button class="cursor-pointer text-sm font-medium text-brand-600 hover:text-brand-700 transition-colors">
              Resend OTP
            </button>
            <p class="text-sm text-slate-500">
              Time Remaining: 5:00
            </p>
          </div>
          <button
            type="submit"
            class="w-full inline-flex items-center justify-center gap-2 px-6 py-3.5 rounded-xl bg-gradient-to-r from-brand-600 to-brand-500 text-white text-sm font-heading font-semibold hover:from-brand-700 hover:to-brand-600 transition-all active:scale-95 shadow-lg shadow-brand-200"
          >
            Verify
            <svg class="w-4 h-4" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          </button>
        </form>
      </div>
    </div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
